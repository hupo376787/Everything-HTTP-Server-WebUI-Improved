        // js/config.js
        // 应用配置：读取用户可编辑的 config.ini，并提供安全回退值。
        const CONFIG_URL = 'config/config.ini';

        const DEFAULT_CONFIG = Object.freeze({
            defaultPath: 'C:\\',
            pageSize: 100,
        });

        function parseAppConfigText(text) {
            const config = {};
            for (const line of text.split(/\r?\n/)) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith(';')) continue;
                const separatorIndex = trimmed.indexOf('=');
                if (separatorIndex === -1) continue;

                const key = trimmed.slice(0, separatorIndex).trim();
                if (key !== 'defaultPath') continue;
                config.defaultPath = trimmed.slice(separatorIndex + 1).trim();
            }
            return config;
        }

        async function loadAppConfig(fetchImpl = fetch) {
            try {
                const response = await fetchImpl(CONFIG_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const userConfig = parseAppConfigText(await response.text());
                return {
                    ...DEFAULT_CONFIG,
                    defaultPath: String(userConfig.defaultPath || DEFAULT_CONFIG.defaultPath),
                };
            } catch (error) {
                console.warn('读取 config.ini 失败，已使用内置默认配置。', error);
                return { ...DEFAULT_CONFIG };
            }
        }

        if (typeof window !== 'undefined') window.AppConfig = { DEFAULT_CONFIG, loadAppConfig, parseAppConfigText };

        // js/format.js
        // 格式化模块：统一处理大小、日期和时间文本。

        function attachFormatMethods(app) {

            app.formatSize = function formatSize(bytes) {
                if (bytes === undefined) return '';
                const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                if (bytes === 0) return '0 B';
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            };

            app.parseDate = function parseDate(ts) {
                if (!ts) return '-';
                let d;
                let numTs = ts;
                if (typeof ts === 'string') {
                    if (ts.includes('T')) {
                        d = new Date(ts);
                        if (!isNaN(d.getTime())) return this.formatDateObj(d);
                    }
                    if (/^\d+$/.test(ts)) {
                        numTs = parseInt(ts, 10);
                    }
                }
                if (typeof numTs === 'number') {
                    if (numTs > 10000000000000000) {
                        d = new Date((numTs / 10000) - 11644473600000);
                    }
                    else if (numTs > 1000000000000) {
                        d = new Date(numTs);
                    }
                    else if (numTs > 0) {
                        d = new Date(numTs * 1000);
                    }
                }
                if (!d || isNaN(d.getTime()) || d.getFullYear() < 1970) return '-';
                return this.formatDateObj(d);
            };

            app.formatDateObj = function formatDateObj(d) {
                const pad = (n) => n.toString().padStart(2, '0');
                return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            };

        }

                }

            app.fetchData = async function fetchData(isExplicitFolder) {
                this.dom.list.innerHTML = `<div class="center-msg">⏳ 加载中...</div>`;
                try {
                    if (window.location.protocol === 'file:' || window.location.protocol === 'blob:') throw new Error('DEMO');

                    let query = this.state.currentPath;

                    if (query === 'root:') {
                    } else if (isExplicitFolder) {
                        query = `parent:"${query}"`;
                    } else {
                        if (/^[a-zA-Z]:\\|^\\\\/.test(query)) {
                            const knownExts = ['exe', 'jpg', 'png', 'txt', 'mp3', 'mp4', 'pdf', 'doc', 'docx', 'zip', 'rar', 'lrc'];
                            const ext = query.split('.').pop().toLowerCase();
                            if (knownExts.includes(ext) && query.split('\\').pop().includes('.')) {
                                query = `"${query}"`;
                            } else {
                                query = `parent:"${query}"`;
                            }
                        }
                    }

                    if (!this.state.showHidden) query += ' !attrib:H';

                    const params = new URLSearchParams({
                        search: query,
                        offset: this.state.offset,
                        count: this.state.count,
                        sort_column: { name: 0, extension: 3, size: 2, date_modified: 5 }[this.state.sortCol] || 0,
                        sort_ascending: this.state.sortAsc,
                        json: 1,
                        path_column: 1,
                        size_column: 1,
                        date_modified_column: 1
                    });

                    const res = await fetch(`/?${params}`);
                    const data = await res.json();
                    this.state.items = data.results || [];
                    this.state.total = parseInt(data.totalResults) || 0;
                    this.renderList();
                    this.updatePagination();
                } catch (e) {
                    if (e.message === 'DEMO') this.mockData();
                    else this.dom.list.innerHTML = `<div class="center-msg" style="color:red">连接失败</div>`;
                }
            };

            app.getFileUrl = function getFileUrl(item) {

            };

            app.fetchFolderChildren = async function fetchFolderChildren(folderPath, fetchImpl = fetch) {
                const count = 1000;
                let offset = 0;
                let total = Infinity;
                const items = [];

                while (offset < total) {
                    let query = `parent:"${folderPath}"`;
                    if (!this.state.showHidden) query += ' !attrib:H';

                    const params = new URLSearchParams({
                        search: query,
                        offset,
                        count,
                        sort_column: 0,
                        sort_ascending: 1,
                        json: 1,
                        path_column: 1,
                        size_column: 1,
                        date_modified_column: 1
                    });

                    const response = await fetchImpl(`/?${params}`);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    const results = data.results || [];
                    items.push(...results);
                    total = parseInt(data.totalResults) || results.length;
                    if (results.length === 0) break;
                    offset += results.length;
                }

            app.saveFolderToDirectory = async function saveFolderToDirectory(folderPath, destinationHandle, fetchImpl = fetch) {
                const safeName = (name) => name.replace(/[<>:"/\\|?*]/g, '_') || 'folder';
                const rootName = safeName(folderPath.split('\\').filter(Boolean).pop() || 'folder');
                const rootHandle = await destinationHandle.getDirectoryHandle(rootName, { create: true });

                const copyFolder = async (currentPath, targetHandle) => {
                    const children = await this.fetchFolderChildren(currentPath, fetchImpl);
                    for (const child of children) {
                        const childPath = this.getItemFullPath(child);
                        if (this.isFolderItem(child)) {
                            const childHandle = await targetHandle.getDirectoryHandle(safeName(child.name), { create: true });

                            continue;
                        }

                        const response = await fetchImpl(this.getFileUrl(child));
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const writable = await targetHandle.getFileHandle(safeName(child.name), { create: true })

                        await writable.write(new Uint8Array(await response.arrayBuffer()));
                        await writable.close();

        function attachNavigationMethods(app) {

            // === 【新增】统一的状态栏动态文本渲染函数 ===
            app.updateStatusText = function updateStatusText() {
                const total = this.state.total || 0;
                let statusText = `共 ${total} 个项目`;

                // 自动兼顾单选 (selectedItem) 和未来可能扩展的多选 (selectedItems)
                let selectedList = [];

                    selectedList = this.state.selectedItems;
                } else if (this.state.selectedItem) {
                    selectedList = [this.state.selectedItem];
                }

                // 如果有选中项目，则在后面追加详细信息
                if (selectedList.length > 0) {
                    const count = selectedList.length;
                    let totalSize = 0;

                    selectedList.forEach(item => {
                        if (item && item.size !== undefined) {
                            const parsed = parseInt(item.size, 10);
                            if (!isNaN(parsed)) {
                                totalSize += parsed;
                            }
                        }
                    });

                    // 格式化选中的大小（优先使用系统的 formatSize，没有则降级显示字节）

            app.navigateTo = function navigateTo(path, isExplicitFolder = false) {
                path = path ? path.replace(/^"|"$/g, '').trim() : '';

                if (path === '') {
                    this.state.currentPath = this.config.defaultPath;
                    path = this.config.defaultPath;
                }

                if (!this.state.isNavigatingHistory) {

                    if (this.state.history[this.state.historyIndex] !== path) {

        // js/details.js
        // 详情模块：渲染属性面板、复制属性、下载和文件类型判断。


        function attachDetailsMethods(app) {

            // 辅助函数：专门处理路径转码，防止截断
            const safeEncode = (url) => {
                if (!url) return url;
                return url.split('/').map(part => encodeURIComponent(part)).join('/');
            };

            // 辅助函数：专门解析 Windows 巨型时间戳字符串 (FILETIME)
            const parseWinTime = (winTimeStr) => {
                if (!winTimeStr) return '未知';
                try {
                    if (String(winTimeStr).length < 15) return winTimeStr;
                    const winTime = BigInt(winTimeStr);
                    const epochDiff = 116444736000000000n;
                    const jsTime = Number((winTime - epochDiff) / 10000n);
                    return new Date(jsTime).toLocaleString('zh-CN', { hour12: false });
                } catch (e) {
                    return winTimeStr;
                }
            };

            app.renderDetails = function renderDetails(item) {
                // 1. 打印触发日志，确认此函数是否真的被调用
                console.log("【诊断】renderDetails 正在渲染条目:", item);

                const pane = this.dom.details;
                if (!item) {
                    if (pane && !this.state.keepDetails) { pane.classList.remove('active'); pane.style.transform = ''; }
                    return;
                }

                if (pane) {
                    if (!this.state.keepDetails) {
                        pane.classList.remove('active');
                        pane.style.transform = '';
                    } else if (window.innerWidth > 768) {
                        pane.classList.add('active');
                    }
                }

                const isDir = this.isFolderItem ? this.isFolderItem(item) : (!item.size && item.size !== 0);
                const icon = this.getFileIcon ? this.getFileIcon(item.name, isDir) : '';
                const rawUrl = item.fakeUrl || (this.getFileUrl ? this.getFileUrl(item) : '');
                const ext = item.name.split('.').pop().toLowerCase();
                const imgs = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg', 'bmp'];

                // 预览区域渲染
                if (this.dom.previewBox) {
                    if (!isDir && imgs.includes(ext)) {
                        const safeUrl = safeEncode(rawUrl);
                        this.dom.previewBox.innerHTML = `<img src="${safeUrl}" class="preview-img">`;
                    } else {
                        this.dom.previewBox.innerHTML = icon;
                    }
                }

                // 渲染文件名
                const nameEl = document.getElementById('detailName');
                if (nameEl) nameEl.textContent = item.name;

                // 【防御保护】：防止 favorites 为空时导致整段代码崩溃卡死
                try {
                    const favBtn = document.getElementById('detailFavBtn');
                    if (favBtn) {
                        const favoritesArray = (this.state && this.state.favorites) || [];
                        const isFav = favoritesArray.some(f => f && f.url === rawUrl);
                        if (isFav) {
                            favBtn.innerHTML = typeof svg_favorite_filled !== 'undefined' ? svg_favorite_filled : '★';
                        } else {
                            favBtn.innerHTML = typeof svg_favorite_outline !== 'undefined' ? svg_favorite_outline : '☆';
                        }
                    }
                } catch (favErr) {
                    console.error("【错误】渲染收藏按钮时崩溃，已自动跳过:", favErr);
                }

                // 【核心赋值函数】：加入 DOM 存在性检查与报错提示
                const renderValue = (id, val) => {
                    const el = document.getElementById(id);
                    if (!el) {
                        // 如果页面上找不到这个 ID，控制台会用黄色警告明确指出！
                        console.warn(`【警告】HTML 页面中找不到 id 为 "${id}" 的标签，请检查你的 HTML 结构！`);
                        return;
                    }
                    el.textContent = val;

                    // 复制功能安全保护
                    if (this.state && this.state.enableCopy) {
                        el.classList.add('copyable');
                        el.onclick = () => this.copyText ? this.copyText(val) : null;
                        el.title = "点击复制";
                    } else {
                        el.classList.remove('copyable');
                        el.onclick = null;
                        el.title = "";
                    }
                };

                // 计算路径
                const locationPath = item.path || 'Root';
                const fullPath = this.getItemFullPath ? this.getItemFullPath(item) : (item.path ? `${item.path}\\${item.name}` : item.name);

                // 2. 执行渲染（各行独立，互不影响）
                renderValue('detailLocation', locationPath);
                renderValue('detailPath', fullPath);
                renderValue('detailType', isDir ? '文件夹' : (ext.toUpperCase() + ' 文件'));

                // 渲染日期（独立异常捕获）
                try {
                    const dateVal = item.date_modified || item.dm || item.dateModified;
                    const finalDateStr = (dateVal && String(dateVal).length > 15) ? parseWinTime(dateVal) : (this.parseDate ? this.parseDate(dateVal) : dateVal);
                    renderValue('detailDate', finalDateStr || '未知');
                } catch (dateErr) {
                    console.error("【错误】渲染日期失败:", dateErr);
                    renderValue('detailDate', '时间格式错误');
                }

                // 渲染大小（独立异常捕获）
                try {
                    if (isDir) {
                        renderValue('detailSize', '-');
                    } else {
                        const parsedSize = parseInt(item.size, 10);
                        const sizeNum = isNaN(parsedSize) ? 0 : parsedSize;
                        renderValue('detailSize', this.formatSize ? this.formatSize(sizeNum) : (sizeNum + ' 字节'));
                    }
                } catch (sizeErr) {
                    console.error("【错误】渲染大小失败:", sizeErr);
                    renderValue('detailSize', '大小格式错误');
                }
            };

            // 打开行为
            app.handleOpenAction = function handleOpenAction(item) {
                const rawUrl = item.fakeUrl || this.getFileUrl(item);
                const safeUrl = safeEncode(rawUrl);
                if (this.state.openMethod === 'newWindow') {
                    window.open(safeUrl, '_blank');
                } else {
                    this.openOverlay(item);
                }
            };

            // 下载行为
            app.triggerDownload = async function triggerDownload(item) {
                if (this.isFolderItem && this.isFolderItem(item)) {
                    await this.downloadFolderToDirectory(item);
                    return;
                }
                const rawUrl = item.fakeUrl || this.getFileUrl(item);
                const link = document.createElement('a');
                link.href = safeEncode(rawUrl);
                link.download = item.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
        }

        // 歌词模块：解析 LRC、渲染歌词并同步播放进度。

        function attachAudioLyricsMethods(app) {

            app.parseLrc = function parseLrc(text) {
                const lines = text.split('\n');
                let result = [];
                const timeExp = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;

                for (let line of lines) {
                    let matches;
                    const content = line.replace(/\[(\d{2}):(\d{2})\.(\d{2,3})\]/g, '').trim();
                    if (!content) continue;

                    while ((matches = timeExp.exec(line)) !== null) {
                        const min = parseInt(matches[1]);
                        const sec = parseInt(matches[2]);
                        const ms = parseInt(matches[3].padEnd(3, '0'));
                        const time = min * 60 + sec + ms / 1000;
                        result.push({ time, content });
                    }
                }

                result.sort((a, b) => a.time - b.time);

                const merged = [];
                if (result.length > 0) {
                    let current = result[0];
                    for (let i = 1; i < result.length; i++) {
                        if (Math.abs(result[i].time - current.time) < 0.2) {
                            current.content += '\n' + result[i].content; // 合并内容
                        } else {
                            merged.push(current);
                            current = result[i];
                        }
                    }
                    merged.push(current);
                }

                return merged;
            };

                let html = '<div style="height:50%"></div>'; // Padding top
                data.forEach((line, i) => {
                    html += `<div class="lyric-line" id="lyric-${uid}-${i}" onclick="app.seekToLyric(${line.time}, '${uid}')">${line.content}</div>`;
                });
                html += '<div style="height:50%"></div>'; // Padding bottom
                container.innerHTML = html;
            };

            app.syncLyrics = function syncLyrics(container, data, time, uid) {
                let activeIndex = -1;
                for (let i = 0; i < data.length; i++) {
                    if (time >= data[i].time) activeIndex = i;
                    else break;
                }

                if (activeIndex !== -1) {
                    const lines = container.querySelectorAll('.lyric-line');
                    const currentActive = container.querySelector('.lyric-line.active');
                    const newActive = document.getElementById(`lyric-${uid}-${activeIndex}`);

                    if (currentActive !== newActive) {
                        if (currentActive) currentActive.classList.remove('active');
                        if (newActive) {
                            newActive.classList.add('active');
                            newActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }
                }
            };

            app.seekToLyric = function seekToLyric(time, uid) {
                const audio = document.getElementById(`audioEl-${uid}`);
                if (audio) audio.currentTime = time;

            app.formatTime = function formatTime(s) {
                if (!s || isNaN(s)) return '00:00';
                const m = Math.floor(s / 60).toString().padStart(2, '0');
                const sec = Math.floor(s % 60).toString().padStart(2, '0');
                return `${m}:${sec}`;
            };

                    btns.forEach(btn => btn.style.color = textColor);
                };
                coverImg.onload = () => {
                    applyAdaptiveTheme(coverImg);
                };
                const initVisualizer = () => {
                    if (audioContext) return; // 避免重复初始化
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    source = audioContext.createMediaElementSource(audio);
                    analyser = audioContext.createAnalyser();
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    analyser.fftSize = 256; // 决定条的数量 (值越大条越细)
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                    const ctx = canvas.getContext('2d');
                    const draw = () => {
                        animationId = requestAnimationFrame(draw);
                        canvas.width = canvas.offsetWidth;
                        canvas.height = canvas.offsetHeight;
                        const width = canvas.width;
                        const height = canvas.height;
                        analyser.getByteFrequencyData(dataArray);
                        ctx.clearRect(0, 0, width, height);
                        const barWidth = (width / bufferLength) * 2.5;
                        let barHeight;
                        let x = 0;
                        for (let i = 0; i < bufferLength; i++) {
                            barHeight = dataArray[i] / 2; // 调整高度比例
                            const fillStyle = playerContainer.style.color === 'rgb(32, 32, 32)'
                                ? `rgba(0,0,0, ${barHeight / 200})`
                                : `rgba(255,255,255, ${barHeight / 200})`;
                            ctx.fillStyle = fillStyle;
                            ctx.fillRect(x, height - barHeight, barWidth, barHeight);
                            x += barWidth + 1;
                        }
                    };
                    draw();
                };
                if (window.jsmediatags) {
                    fetch(file.url).then(r => r.blob()).then(blob => {
                        window.jsmediatags.read(blob, {
                            onSuccess: (tag) => {
                                const tags = tag.tags;
                                if (tags.title) titleEl.textContent = tags.title;
                                if (tags.artist) artistEl.textContent = tags.artist;
                                if (tags.picture) {
                                    const { data, format } = tags.picture;
                                    let base64String = "";
                                    for (let i = 0; i < data.length; i++) base64String += String.fromCharCode(data[i]);
                                    coverImg.src = `data:${format};base64,${window.btoa(base64String)}`;
                                    coverImg.style.opacity = 1;
                                    coverPh.style.display = 'none';
                                }
                            },
                            onError: (error) => { console.log('Tags read error', error); }
                        });
                    });
                }
                const lrcUrl = file.url.replace(/\.[^.]+$/, '.lrc');
                fetch(lrcUrl).then(r => { if (r.ok) return r.text(); throw new Error(); })
                    .then(text => {
                        lyricsData = this.parseLrc(text);
                        this.renderLyrics(lyricsBox, lyricsData, file.uniqueId);
                    }).catch(() => { lyricsBox.innerHTML = '<div style="margin-top:50%;">暂无歌词</div>'; });
                audio.volume = 1;
                let lastVolume = 1; // 用于静音恢复
                const updateVolumeUI = () => {
                    const vol = audio.volume;
                    volumeRangeInput.value = vol;
                    if (volumePercentText) {
                        volumePercentText.textContent = Math.round(vol * 100) + '%';
                    }
                    if (vol === 0) {
                        volumeToggleBtn.innerHTML = svg_volume_mute;
                        volumeToggleBtn.style.opacity = 0.5;
                    } else {
                        volumeToggleBtn.innerHTML = svg_volume;
                        volumeToggleBtn.style.opacity = 0.8;
                    }
                };
                volumeToggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (audio.volume > 0) {
                        lastVolume = audio.volume;
                        audio.volume = 0;
                    } else {
                        audio.volume = lastVolume > 0 ? lastVolume : 1;
                    }
                    updateVolumeUI();
                };
                volumeRangeInput.oninput = (e) => {
                    e.stopPropagation(); // 关键：防止拖动时触发外部点击事件
                    audio.volume = parseFloat(e.target.value);
                    updateVolumeUI();
                };
                volumePopupPanel.onclick = (e) => {
                    e.stopPropagation();
                };
                updateVolumeUI();
                const closeVolPopup = () => {
                    if (volumePopupPanel.classList.contains('show')) {
                        volumePopupPanel.classList.remove('show');
                    }
                };
                playerContainer.addEventListener('click', closeVolPopup);
                const updateVolIcon = () => {
                    if (audio.volume === 0) {
                        volumeToggleBtn.innerHTML = svg_volume_mute;
                        volumeToggleBtn.style.opacity = 0.5;
                    } else {
                        volumeToggleBtn.innerHTML = svg_volume;
                        volumeToggleBtn.style.opacity = 0.8;
                    }
                };
                let lastVol = 1;
                volumeToggleBtn.onclick = () => {
                    if (audio.volume > 0) {
                        lastVol = audio.volume;
                        audio.volume = 0;
                        volumeRangeInput.value = 0;
                    } else {
                        audio.volume = lastVol > 0 ? lastVol : 0.5;
                        volumeRangeInput.value = audio.volume;
                    }
                    updateVolIcon();
                };
                playBtn.onclick = () => {
                    if (!audioContext) initVisualizer();
                    if (audioContext && audioContext.state === 'suspended') audioContext.resume();
                    if (audio.paused) {
                        audio.play();
                        playBtn.innerHTML = svg_pause;
                        coverImg.classList.add('playing');
                    } else {
                        audio.pause();
                        playBtn.innerHTML = svg_play;
                        coverImg.classList.remove('playing');
                    }
                };
                audio.addEventListener('timeupdate', () => {
                    if (!isDragging) {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progress.style.width = `${percent}%`;
                        curTimeEl.textContent = this.formatTime(audio.currentTime);
                    }
                    if (lyricsData.length > 0) this.syncLyrics(lyricsBox, lyricsData, audio.currentTime, file.uniqueId);
                });
                audio.addEventListener('loadedmetadata', () => {
                    durTimeEl.textContent = this.formatTime(audio.duration);
                    audio.play().catch(() => { }).then(() => {
                        if (!audioContext) initVisualizer();
                    });
                    playBtn.innerHTML = svg_pause;
                    coverImg.classList.add('playing');
                });
                audio.addEventListener('ended', () => {
                    if (this.state.loopMode === 'one') {
                        audio.currentTime = 0;
                        audio.play();

                    else if (this.state.loopMode === 'list' || this.state.loopMode === 'shuffle') {

                    else {
                        playBtn.innerHTML = svg_play;
                        coverImg.classList.remove('playing');
                        progress.style.width = '0%';
                    }
                });
                const handleDrag = (clientX) => {
                    const rect = progressArea.getBoundingClientRect();
                    let percent = (clientX - rect.left) / rect.width;
                    percent = Math.max(0, Math.min(1, percent));
                    progress.style.width = `${percent * 100}%`;
                    const dragTime = percent * audio.duration;
                    curTimeEl.textContent = this.formatTime(dragTime);
                    return dragTime;
                };
                const startDrag = (clientX) => { isDragging = true; handleDrag(clientX); };
                const doDrag = (clientX) => { if (isDragging) handleDrag(clientX); };
                const endDrag = (clientX) => {
                    if (isDragging) {
                        audio.currentTime = handleDrag(clientX);
                        isDragging = false;
                    }
                };
                progressArea.addEventListener('mousedown', (e) => {
                    startDrag(e.clientX);
                    const onMove = (ev) => doDrag(ev.clientX);
                    const onUp = (ev) => { endDrag(ev.clientX); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
                    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
                });
                progressArea.addEventListener('touchstart', (e) => {
                    startDrag(e.touches[0].clientX);
                    const onMove = (ev) => { ev.preventDefault(); doDrag(ev.touches[0].clientX); };
                    const onUp = (ev) => { endDrag(ev.changedTouches[0].clientX); document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp); };
                    document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onUp);
                }, { passive: false });
                const makeDraggable = (el) => {
                    let isDraggingPlayer = false;
                    let startX, startY, initialLeft, initialTop;
                    const onMouseDown = (e) => {
                        const noDragSelector = [
                            'button',
                            '.audio-progress-container',
                            '.audio-section-lyrics',
                            '.cc-btn',
                            '.icon-btn',
                            '.volume-wrapper',
                            '.audio-section-info img',
                            '.audio-meta'
                        ].join(','); // 将数组合并成 "button, .class1, .class2..." 的字符串
                        if (e.target.closest(noDragSelector)) {
                            el.style.cursor = 'default';
                            return;
                        }
                        if (e.button !== 0) return;
                        if (this.state.isPinned) return;//钉住状态
                        isDraggingPlayer = true;
                        startX = e.clientX;
                        startY = e.clientY;
                        const rect = el.getBoundingClientRect();
                        const parentRect = el.parentElement.getBoundingClientRect();
                        initialLeft = rect.left - parentRect.left;
                        initialTop = rect.top - parentRect.top;
                        el.style.transform = 'none';
                        el.style.left = `${initialLeft}px`;
                        el.style.top = `${initialTop}px`;
                        el.style.cursor = 'grabbing';
                        document.addEventListener('mousemove', onMouseMove);
                        document.addEventListener('mouseup', onMouseUp);
                    };
                    const onMouseMove = (e) => {
                        if (!isDraggingPlayer) return;
                        e.preventDefault(); // 防止选中文字
                        const dx = e.clientX - startX;
                        const dy = e.clientY - startY;
                        el.style.left = `${initialLeft + dx}px`;
                        el.style.top = `${initialTop + dy}px`;
                    };
                    const onMouseUp = () => {
                        isDraggingPlayer = false;
                        el.style.cursor = 'move';
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);
                    };
                    if (window.innerWidth > 768) {
                        el.addEventListener('mousedown', onMouseDown);
                    }
                };
                makeDraggable(playerContainer);
                file._audioContext = {
                    audio,
                    ctx: audioContext, // Web Audio Context
                    close: () => {
                        if (animationId) cancelAnimationFrame(animationId);
                        if (audioContext) audioContext.close();
                    }
                };
            };
        }

            app.playNextInFavorites = function playNextInFavorites(currentFile, isShuffle) {
                const allFavs = this.state.favorites;
                if (!allFavs || allFavs.length === 0) return;

                const audioFavs = allFavs.filter(f => {
                    if (f.isFolder) return false;
                    const ext = f.url.split('.').pop().toLowerCase();
                    return this.getFileType(ext) === 'audio';
                });

                if (audioFavs.length === 0) return;

                const currentIndex = audioFavs.findIndex(f => f.url === currentFile.url);

                let nextIndex = 0;

                if (isShuffle) {
                    if (audioFavs.length > 1) {
                        do {
                            nextIndex = Math.floor(Math.random() * audioFavs.length);
                        } while (nextIndex === currentIndex);
                    }
                } else {
                    if (currentIndex !== -1) {
                        nextIndex = (currentIndex + 1) % audioFavs.length;
                    }
                }

                const nextFav = audioFavs[nextIndex];

                const nextItem = {
                    name: nextFav.name,
                    fakeUrl: nextFav.url,
                };

                this.showToast(isShuffle ? `随机播放: ${nextItem.name}` : `播放下一首: ${nextItem.name}`);

                this.handleOpenAction(nextItem);
            };

        // js/subtitles.js
        // 字幕模块：加载本地字幕、查找相邻字幕并转换 SRT。

        function attachSubtitleMethods(app) {

            app.initSubtitleHandler = function initSubtitleHandler() {
                this.dom.subtitleInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.handleSubtitleFile(file);
                    }
                    e.target.value = '';
                });
            };

            app.triggerSubtitleLoad = function triggerSubtitleLoad() {
                this.dom.subtitleInput.click();
            };

            app.handleSubtitleFile = function handleSubtitleFile(file) {
                if (this.state.activeFileIndex === -1) return;
                const currentViewerFile = this.state.openFiles[this.state.activeFileIndex];

                const name = file.name.toLowerCase();
                const type = name.endsWith('.srt') ? 'srt' : 'vtt';
                const objectUrl = URL.createObjectURL(file);

                const fakeSelect = {
                    value: objectUrl,
                    options: [{ dataset: { type: type }, selectedIndex: 0 }],
                    selectedIndex: 0
                };

                this.changeSubtitle({ value: objectUrl, dataset: { type: type } }, currentViewerFile.uniqueId, true);
                this.showToast(`已加载字幕: ${file.name}`);
            };

            app.findAndLoadSubtitles = async function findAndLoadSubtitles(file, container) {
                if (!file || !file.url) return;

                const lastDotIndex = file.url.lastIndexOf('.');
                if (lastDotIndex === -1) return;
                const baseUrl = file.url.substring(0, lastDotIndex);

                const candidates = [
                    { label: '默认 (.vtt)', url: `${baseUrl}.vtt`, type: 'vtt' },
                    { label: '默认 (.srt)', url: `${baseUrl}.srt`, type: 'srt' },
                    { label: '中文 (.zh.vtt)', url: `${baseUrl}.zh.vtt`, type: 'vtt' },
                    { label: '中文 (.zh.srt)', url: `${baseUrl}.zh.srt`, type: 'srt' }
                ];

                for (let sub of candidates) {
                    try {
                        const res = await fetch(sub.url, { method: 'GET' });
                        if (res.ok) {
                            console.log(`Auto-loaded subtitle: ${sub.url}`);
                            this.changeSubtitle({
                                value: sub.url,
                                dataset: { type: sub.type }
                            }, file.uniqueId);
                            break;
                        }
                    } catch (e) {
                    }
                }
            };

            app.changeSubtitle = async function changeSubtitle(sourceObj, uid) {
                const videoEl = document.getElementById(`video-${uid}`);
                if (!videoEl) return;

                const url = sourceObj.value;
                if (!url) return;

                const oldTrack = videoEl.querySelector('track');
                if (oldTrack) {
                    if (oldTrack.src.startsWith('blob:')) {
                        URL.revokeObjectURL(oldTrack.src); // 释放旧的 Blob 内存
                    }
                    oldTrack.remove();
                }
                Array.from(videoEl.querySelectorAll('track')).forEach(t => t.remove());

                const type = sourceObj.dataset.type;
                let finalUrl = url;

                try {
                    if (type === 'srt') {
                        console.log("Converting SRT to VTT...");
                        const res = await fetch(url);
                        const srtText = await res.text();

                        const vttText = this.srt2webvtt(srtText);

                        const blob = new Blob([vttText], { type: 'text/vtt' });
                        finalUrl = URL.createObjectURL(blob);
                    }
                } catch (e) {
                    console.error('Subtitle conversion failed:', e);
                    return;
                }

                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = '';
                track.srclang = 'zh';
                track.src = finalUrl;
                track.default = true;

                videoEl.appendChild(track);

                setTimeout(() => {
                    if (videoEl.textTracks && videoEl.textTracks.length > 0) {
                        const t = videoEl.textTracks[videoEl.textTracks.length - 1];
                        t.mode = 'showing'; // 强制显示
                    }
                }, 100);
            };

            app.srt2webvtt = function srt2webvtt(data) {
                let srt = data.replace(/\r\n|\r/g, '\n');

                srt = srt.trim();

                const vttBody = srt.replace(
                    /(\d{2}:\d{2}:\d{2}),(\d{3})/g,
                    '$1.$2'
                );

                return "WEBVTT\n\n" + vttBody;
            };

        }

            app.animateClear = function animateClear() {
                const input = this.dom.address;

                const rect = input.getBoundingClientRect();
                const computedStyle = window.getComputedStyle(input);
                const addressContainer = input.closest('.address-container');

                const overlay = document.createElement('div');
                overlay.className = 'flying-text-overlay';

                overlay.style.left = rect.left + 'px';
                overlay.style.top = rect.top + 'px';
                overlay.style.width = rect.width + 'px';
                overlay.style.height = rect.height + 'px';
                overlay.style.fontFamily = computedStyle.fontFamily;
                overlay.style.fontSize = computedStyle.fontSize;
                overlay.style.paddingLeft = computedStyle.paddingLeft;
                overlay.style.color = computedStyle.color;
                overlay.textContent = text;

                document.body.appendChild(overlay);

                input.classList.add('input-animating');
                if (addressContainer) addressContainer.classList.add('is-clearing');

                input.value = '';
                input.focus();

                setTimeout(() => {
                    overlay.remove();

            app.isTextEditingTarget = function isTextEditingTarget(target) {

            app.handleGlobalKeydown = function handleGlobalKeydown(e) {
                if (this.isTextEditingTarget(e.target)) return;

                if (e.key === ' ' || e.key === 'Spacebar') {
                    const viewerClassList = this.dom.viewerModal && this.dom.viewerModal.classList;
                    if (viewerClassList && viewerClassList.contains('open') && !viewerClassList.contains('minimized')) {
                        e.preventDefault();

                    }
                    if (!this.state.selectedItem) return;
                    e.preventDefault();
                    this.handleOpenAction(this.state.selectedItem);
                    return;
                }

                if (e.key === 'Escape') {
                    const viewerClassList = this.dom.viewerModal && this.dom.viewerModal.classList;
                    const viewerOpen = viewerClassList && viewerClassList.contains('open');
                    const viewerMinimized = viewerClassList && viewerClassList.contains('minimized');

                    e.preventDefault();
                    if (viewerOpen && !viewerMinimized) {
                        this.minimizeViewer();
                        return;

                    this.dom.viewMenu.classList.remove('show');
                    this.dom.settingsMenu.classList.remove('show');
                    this.dom.sidebar.classList.remove('show-mobile');
                    this.closeDetails();

            // =========================================================================

            // 高亮同步渲染器：扫描界面上所有的行，根据多选状态强制添加/移除高亮类名
            app.syncRowHighlights = function syncRowHighlights() {
                if (!this.dom.list || !this.state.items) return;

                // 兼容抓取列表或网格视图下所有的文件 DOM 行节点
                const rows = this.dom.list.querySelectorAll('.file-item, .file-row, .list-item, [data-index], .view-grid > div, .view-xlgrid > div, #fileList > div, .item');
                const elements = rows.length ? Array.from(rows) : Array.from(this.dom.list.children);

                elements.forEach(el => {
                    let item = null;
                    // 1. 尝试通过虚拟滚动的 data-index 匹配
                    if (el.dataset && el.dataset.index !== undefined) {
                        const idx = parseInt(el.dataset.index, 10);
                        item = this.state.items[idx];
                    }
                    // 2. 备用手段：通过文本/标题信息模糊检索对应的数据对象
                    if (!item) {
                        const txt = el.textContent || "";
                        item = this.state.items.find(i => i.name && (txt.includes(i.name) || el.title === i.name || (el.querySelector('.name') && el.querySelector('.name').textContent === i.name)));
                    }

                    if (item) {
                        const isSelected = this.state.selectedItems && this.state.selectedItems.some(i => i.name === item.name && i.path === item.path);
                        if (isSelected) {
                            el.classList.add('selected'); // Win11 默认选择类
                            el.classList.add('active');   // 备用高亮类
                        } else {
                            // 保护核心选中的那项，避免与原版底层机制发生渲染冲突
                            if (item !== this.state.selectedItem) {
                                el.classList.remove('selected');
                                el.classList.remove('active');
                            }
                        }
                    }
                });
            };

            // 注册生命周期切面：让系统初始化完成后，全自动监听多选操作与重绘事件
            setTimeout(() => {
                // 1. 绑定列表容器的滚动与内容变更（完美解决虚拟滚动滑出屏幕后重新生成的 DOM 渲染）
                if (app.dom.list) {
                    app.dom.list.addEventListener('scroll', () => app.syncRowHighlights && app.syncRowHighlights());

                    // 使用 MutationObserver 监听列表内 DOM 节点的增删改
                    const listObserver = new MutationObserver(() => {
                        if (app.syncRowHighlights) app.syncRowHighlights();
                    });
                    listObserver.observe(app.dom.list, { childList: true, subtree: true });
                }

                // 2. 深度拦截渲染细节入口，用原生 window.event 抓取点击瞬间的 Ctrl 与 Shift 状态
                const originalRenderDetails = app.renderDetails;
                app.renderDetails = function interceptedMultiSelectRenderDetails(item) {
                    const e = window.event;

                    // 判断当前是否是由鼠标列表点击触发的细节刷新
                    if (item && e && (e.type === 'click' || e.type === 'mousedown')) {
                        const items = this.state.items || [];
                        const currentIndex = items.findIndex(i => i.name === item.name && i.path === item.path);

                        if (!this.state.selectedItems) this.state.selectedItems = [];
                        if (this.state.lastSelectedIndex === undefined) this.state.lastSelectedIndex = null;

                        if (e.ctrlKey) {
                            // === 【Ctrl + 点击】 加选/反选单项 ===
                            const idx = this.state.selectedItems.findIndex(i => i.name === item.name && i.path === item.path);
                            if (idx > -1) {
                                this.state.selectedItems.splice(idx, 1); // 存在则移出
                                this.state.selectedItem = this.state.selectedItems[this.state.selectedItems.length - 1] || null;
                            } else {
                                this.state.selectedItems.push(item);     // 不存在则加选
                                this.state.selectedItem = item;
                            }
                            this.state.lastSelectedIndex = currentIndex;
                        } else if (e.shiftKey && this.state.lastSelectedIndex !== null && currentIndex !== -1) {
                            // === 【Shift + 点击】 连续区间连选 ===
                            const start = Math.min(this.state.lastSelectedIndex, currentIndex);
                            const end = Math.max(this.state.lastSelectedIndex, currentIndex);
                            this.state.selectedItems = items.slice(start, end + 1);
                            this.state.selectedItem = item; // 右侧边栏锁定显示最后点击的这个文件
                        } else {
                            // === 普通单选点击 ===
                            this.dom.list.querySelectorAll('.selected, .active').forEach(el => el.classList.remove('selected', 'active'));
                            this.state.selectedItems = [];
                            this.state.selectedItem = null;
                            this.state.selectedItems = [item];
                            this.state.selectedItem = item;
                            this.state.lastSelectedIndex = currentIndex;
                        }

                        // 回调原版核心逻辑
                        if (originalRenderDetails) {
                            originalRenderDetails.call(this, this.state.selectedItem);
                        }
                    } else {
                        // 自动化触发或传空（如跳转文件夹、清除选中等情况）
                        if (!item) {
                            this.state.selectedItems = [];
                            this.state.lastSelectedIndex = null;
                        } else if (!this.state.selectedItems || this.state.selectedItems.length === 0) {
                            this.state.selectedItems = [item];
                        }
                        if (originalRenderDetails) {
                            originalRenderDetails.call(this, item);
                        }
                    }

                    // 3. 驱动底部的状态栏同步刷新，同时指挥高亮引擎渲染页面行高亮
                    if (this.updateStatusText) this.updateStatusText();
                    this.syncRowHighlights();
                };
            }, 0);

            // =========================================================================
            // === 【完美修复引用版】 智能鼠标拖拽矩形框选引擎 (解决单选残留浅蓝问题) ===
            // =========================================================================

            setTimeout(() => {
                const container = app.dom.list;
                if (!container) return;

                if (window.getComputedStyle(container).position === 'static') {
                    container.style.position = 'relative';
                }

                container.addEventListener('mousedown', function (e) {
                    if (e.button !== 0) return; // 仅限左键

                    // 如果点在具体文件行、图标上，不触发框选
                    const isItem = e.target.closest('.file-item, .file-row, .list-item, [data-index], .view-grid > div, .view-xlgrid > div, .item');
                    if (isItem) return;

                    // 排除点在滚动条上的情况
                    if (e.clientX > container.getBoundingClientRect().left + container.clientWidth) return;
                    if (e.clientY > container.getBoundingClientRect().top + container.clientHeight) return;

                    e.preventDefault();

                    const rect = container.getBoundingClientRect();
                    const startX = e.clientX - rect.left + container.scrollLeft;
                    const startY = e.clientY - rect.top + container.scrollTop;

                    // 创建 Win11 风格半透明选框
                    const selectionBox = document.createElement('div');
                    selectionBox.style.position = 'absolute';
                    selectionBox.style.border = '1px solid rgba(0, 103, 192, 0.65)';
                    selectionBox.style.backgroundColor = 'rgba(0, 103, 192, 0.12)';
                    selectionBox.style.pointerEvents = 'none';
                    selectionBox.style.zIndex = '99999';
                    selectionBox.style.left = startX + 'px';
                    selectionBox.style.top = startY + 'px';
                    selectionBox.style.width = '0px';
                    selectionBox.style.height = '0px';

                    const isCtrlHeld = e.ctrlKey;
                    const baseSelectedItems = isCtrlHeld && app.state.selectedItems ? [...app.state.selectedItems] : [];

                    const rows = container.querySelectorAll('.file-item, .file-row, .list-item, [data-index], .view-grid > div, .view-xlgrid > div, .item');
                    const domElements = rows.length ? Array.from(rows) : Array.from(container.children);

                    const elementItemMap = [];
                    domElements.forEach(el => {
                        let item = null;
                        if (el.dataset && el.dataset.index !== undefined) {
                            item = app.state.items[parseInt(el.dataset.index, 10)];
                        }
                        if (!item && app.state.items) {
                            const txt = el.textContent || "";
                            item = app.state.items.find(i => i.name && (txt.includes(i.name) || el.title === i.name));
                        }
                        if (item) {
                            elementItemMap.push({ element: el, model: item });
                        }
                    });

                    let hasMoved = false;

                    function onMouseMove(moveEvent) {
                        const currentX = moveEvent.clientX - rect.left + container.scrollLeft;
                        const currentY = moveEvent.clientY - rect.top + container.scrollTop;

                        if (!hasMoved) {
                            if (Math.abs(startX - currentX) > 4 || Math.abs(startY - currentY) > 4) {
                                hasMoved = true;
                                container.appendChild(selectionBox);
                            }
                        }

                        if (!hasMoved) return;

                        const boxLeft = Math.min(startX, currentX);
                        const boxTop = Math.min(startY, currentY);
                        const boxWidth = Math.abs(startX - currentX);
                        const boxHeight = Math.abs(startY - currentY);

                        selectionBox.style.left = boxLeft + 'px';
                        selectionBox.style.top = boxTop + 'px';
                        selectionBox.style.width = boxWidth + 'px';
                        selectionBox.style.height = boxHeight + 'px';

                        const boxBounds = selectionBox.getBoundingClientRect();
                        const currentCapturedItems = [];

                        elementItemMap.forEach(pair => {
                            const elBounds = pair.element.getBoundingClientRect();
                            const isIntersected = !(
                                boxBounds.right < elBounds.left ||
                                boxBounds.left > elBounds.right ||
                                boxBounds.bottom < elBounds.top ||
                                boxBounds.top > elBounds.bottom
                            );

                            if (isIntersected) {
                                currentCapturedItems.push(pair.model);
                            }
                        });

                        let finalSelection = [];
                        if (isCtrlHeld) {
                            finalSelection = [...baseSelectedItems];
                            currentCapturedItems.forEach(item => {
                                if (!finalSelection.some(i => i.name === item.name && i.path === item.path)) {
                                    finalSelection.push(item);
                                }
                            });
                        } else {
                            finalSelection = currentCapturedItems;
                        }

                        // 核心修复点 1：确保核心状态数组存在
                        if (!app.state.selectedItems) app.state.selectedItems = [];

                        // 核心修复点 2：绝对不破坏原始数组的内存指针，采用原地增删技术 (In-place mutation)
                        app.state.selectedItems.length = 0;
                        finalSelection.forEach(item => {
                            app.state.selectedItems.push(item);
                        });

                        app.state.selectedItem = finalSelection[finalSelection.length - 1] || null;

                        // 底层 DOM 样式强力全量清洗同步
                        elementItemMap.forEach(pair => {
                            const isTargetSelected = finalSelection.some(item =>
                                item.name === pair.model.name && item.path === pair.model.path
                            );

                            if (isTargetSelected) {
                                pair.element.classList.add('selected');
                            } else {
                                pair.element.classList.remove('selected', 'active', 'focus');
                            }
                        });

                        if (app.syncRowHighlights) app.syncRowHighlights();
                    }

                    function onMouseUp() {
                        if (selectionBox.parentNode) {
                            selectionBox.parentNode.removeChild(selectionBox);
                        }

                        window.removeEventListener('mousemove', onMouseMove);
                        window.removeEventListener('mouseup', onMouseUp);

                        if (hasMoved) {
                            const interceptClick = function (clickEvent) {
                                clickEvent.stopPropagation();
                                clickEvent.stopImmediatePropagation();
                                clickEvent.preventDefault();
                                window.removeEventListener('click', interceptClick, true);
                            };
                            window.addEventListener('click', interceptClick, true);

                            setTimeout(() => {
                                window.removeEventListener('click', interceptClick, true);
                            }, 50);
                        }

                        if (app.state.selectedItem && app.renderDetails) {
                            const mockEvent = window.event;
                            window.event = null;
                            app.renderDetails(app.state.selectedItem);
                            window.event = mockEvent;
                        } else if (!app.state.selectedItem && app.closeDetails) {
                            app.closeDetails();
                        }

                        if (app.updateStatusText) app.updateStatusText();
                    }

                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                });
            }, 50);


        }


        // js/drag.js
        // 拖拽模块：详情面板拖拽、侧边栏滑动和图片取色。
        function attachDragMethods(app) {
            app.initDragHandles = function initDragHandles() {
                const deskHandle_detail = document.getElementById('dragHandleDesk_detail');
                const mobileHandle_detail = document.getElementById('dragHandleMobile_detail');

                deskHandle_detail.addEventListener('mousedown', (e) => this.startDrag(e, 'desk'));
                mobileHandle_detail.addEventListener('touchstart', (e) => this.startDrag(e.touches[0], 'mobile'), { passive: false });

                document.addEventListener('mousemove', (e) => this.onDragMove(e, 'desk'));
                document.addEventListener('touchmove', (e) => {
                    if (this.state.drag.active) e.preventDefault();
                    this.onDragMove(e.touches[0], 'mobile');
                }, { passive: false });

                document.addEventListener('mouseup', () => this.endDrag('desk'));
                document.addEventListener('touchend', () => this.endDrag('mobile'));
            };

            app.initSidebarSwipe = function initSidebarSwipe() {
                const sidebar = this.dom.sidebar;
                let startX = 0;
                let startY = 0;
                let isSwiping = false;

                sidebar.addEventListener('touchstart', (e) => {
                    if (!sidebar.classList.contains('show-mobile')) return;

                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isSwiping = false;

                    sidebar.style.transition = 'none';
                }, { passive: true });

                sidebar.addEventListener('touchmove', (e) => {
                    if (!sidebar.classList.contains('show-mobile')) return;

                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const deltaX = currentX - startX;
                    const deltaY = currentY - startY;

                    if (deltaX < 0 && Math.abs(deltaX) > Math.abs(deltaY)) {
                        isSwiping = true;
                        e.preventDefault(); // 阻止浏览器默认行为（如滚动）
                        sidebar.style.transform = `translateX(${deltaX}px)`;
                    }
                }, { passive: false }); // 注意：这里必须是 false 才能调用 preventDefault

                sidebar.addEventListener('touchend', (e) => {
                    if (!sidebar.classList.contains('show-mobile')) return;

                    sidebar.style.transition = '';

                    const deltaX = e.changedTouches[0].clientX - startX;

                    if (isSwiping && deltaX < -80) {
                        this.toggleSidebar();
                        setTimeout(() => {
                            sidebar.style.transform = '';
                        }, 300);
                    } else {
                        sidebar.style.transform = '';
                    }
                    isSwiping = false;
                });
            };

            app.startDrag = function startDrag(e, mode) {
                this.state.drag.active = true;
                this.state.drag.startPos = mode === 'desk' ? e.clientX : e.clientY;
                this.dom.details.style.transition = 'none'; // 拖动时移除过渡
            };

            app.onDragMove = function onDragMove(e, mode) {
                if (!this.state.drag.active) return;
                const current = mode === 'desk' ? e.clientX : e.clientY;
                const delta = current - this.state.drag.startPos;

                if (delta < 0) return;

                this.state.drag.currentTranslate = delta;
                const transform = mode === 'desk' ? `translateX(${delta}px)` : `translateY(${delta}px)`;
                this.dom.details.style.transform = transform;
            };

            app.endDrag = function endDrag(mode) {
                if (!this.state.drag.active) return;
                this.state.drag.active = false;
                this.dom.details.style.transition = ''; // 恢复过渡效果

                const threshold = mode === 'desk' ? 100 : 150; // 触发关闭的阈值

                if (this.state.drag.currentTranslate > threshold) {
                    this.closeDetails();
                } else {
                    this.dom.details.style.transform = '';
                }
                this.state.drag.currentTranslate = 0;
            };

            app.getAverageRGB = function getAverageRGB(imgEl) {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext && canvas.getContext('2d');
                if (!context) return { r: 0, g: 0, b: 0 };

                const height = canvas.height = imgEl.naturalHeight || imgEl.offsetHeight || 100;
                const width = canvas.width = imgEl.naturalWidth || imgEl.offsetWidth || 100;

                context.drawImage(imgEl, 0, 0);

                try {
                    const data = context.getImageData(0, 0, width, height);
                    const length = data.data.length;
                    let i = -4, count = 0;
                    let R = 0, G = 0, B = 0;

                    while ((i += 50 * 4) < length) {
                        ++count;
                        R += data.data[i];
                        G += data.data[i + 1];
                        B += data.data[i + 2];
                    }

                    return {
                        r: Math.floor(R / count),
                        g: Math.floor(G / count),
                        b: Math.floor(B / count)
                    };
                } catch (e) {
                    return { r: 50, g: 50, b: 50 };
                }
            };

            app.isLightColor = function isLightColor(r, g, b) {
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                return yiq >= 128;
            };

        }

        // js/lifecycle.js
        // 生命周期模块：初始化主题、菜单、事件和默认路径。

        function attachLifecycleMethods(app) {

            app.init = function init() {
                this.applyTheme();          // 应用主题样式（亮色/深色主题）
                this.updateMenusUI();       // 更新菜单UI状态（如视图菜单、设置菜单的选中状态）
                this.loadDrives();          // 加载系统驱动器/磁盘列表（如C盘、D盘、E盘等）
                this.renderFavorites();     // 渲染收藏列表（从本地存储读取并展示收藏的文件/文件夹）
                this.initResize();          // 初始化元素大小调整功能（如列表列宽、面板尺寸调整）
                this.initDragHandles();     // 初始化拖拽手柄（如侧边栏、预览面板的拖拽调整手柄）
                this.initSidebarSwipe();    // 初始化侧边栏滑动功能（如侧边栏的左滑关闭）
                this.initSubtitleHandler(); // 初始化字幕处理逻辑（用于视频字幕加载）
                this.initKeyboardShortcuts(); // 初始化桌面键盘快捷键

                // 【修改】拦截浏览器原生返回/前进键，处理预览窗关闭和内部导航
                window.addEventListener('popstate', (e) => {
                    // 1. 如果当前有预览窗口打开，拦截返回动作：改为关闭预览
                    const viewerModal = this.dom.viewerModal;
                    if (viewerModal && viewerModal.classList.contains('open')) {
                        // 循环关闭所有打开的预览文件
                        while (this.state.openFiles.length > 0) {
                            this.closeFile(0); // 内部会自动触发 hideViewer
                        }
                        
                        // 因为这只是一次“关闭预览”的返回，如果底层文件夹路径没变，就直接中止，避免重新请求网络
                        if (e.state && e.state.path === this.state.currentPath) {
                            return;
                        }
                    }

                    // 2. 正常处理文件夹导航
                    if (e.state && e.state.path !== undefined) {
                        this.state.historyIndex = e.state.index;
                        
                        // 【关键防抖】如果弹栈后的路径和当前路径一模一样，不需要重复刷新页面
                        if (e.state.path === this.state.currentPath) {
                            return;
                        }

                        this.state.isNavigatingHistory = true; 
                        this.navigateTo(e.state.path, true);
                    }
                });

                this.dom.address.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.navigateTo(this.dom.address.value.trim());
                });

                this.dom.clearBtn.addEventListener('click', () => {
                    this.animateClear();
                });

                document.getElementById('btnPreview').addEventListener('click', () => {
                    if (this.state.selectedItem) this.handleOpenAction(this.state.selectedItem);
                });
                document.getElementById('btnDownload').addEventListener('click', () => {
                    if (this.state.selectedItem) this.triggerDownload(this.state.selectedItem);
                });

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.flyout-menu') && !e.target.closest('.icon-btn')) {
                        this.dom.viewMenu.classList.remove('show');
                        this.dom.settingsMenu.classList.remove('show');
                        if (window.innerWidth <= 768 &&
                            !e.target.closest('.sidebar') &&
                            !e.target.closest('#mobileMenuBtn')) {
                            this.dom.sidebar.classList.remove('show-mobile');
                        }
                    }
                });

                this.navigateTo(this.config.defaultPath);
            };

        }

        // js/app.js
        // 应用入口：组合各功能模块，并继续暴露 window.app 兼容 HTML 内联事件。
        (function bootstrapApp() {
            const app = { config: Object.assign({}, DEFAULT_CONFIG), state: createState(), dom: {} };
            app.state.count = app.config.pageSize;

            [
                attachFormatMethods,
                attachApiMethods,
                attachNavigationMethods,
                attachRenderListMethods,
                attachDetailsMethods,
                attachFavoriteMethods,
                attachViewerMethods,
                attachAudioLyricsMethods,
                attachAudioInitMethods,
                attachAudioMethods,
                attachSubtitleMethods,
                attachInteractionMethods,
                attachDragMethods,
                attachLifecycleMethods,
            ].forEach((attach) => attach(app));

            const originalInit = app.init;
            app.init = function init() {
                this.dom = queryDom();
                originalInit.call(this);
            };

            window.app = app;

            loadAppConfig().then(realConfig => {
                Object.assign(app.config, realConfig);
                app.state.count = app.config.pageSize;
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', () => app.init());
                } else {
                    app.init();
                }
            });
        })();

    </script>
